# Konfigurasi Jalur API PNetLab (Global Alias)
# Jalur ini akan ditambahkan ke server tanpa menimpa website utama

Alias /bulkuser/api/v2 /var/www/html/pnetlab-create-bulk-user/app/public
Alias /bulkuser/api/v2/ /var/www/html/pnetlab-create-bulk-user/app/public/

<Directory /var/www/html/pnetlab-create-bulk-user/app/public>
    Options -Indexes +FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>

# Keamanan tambahan: Matikan directory listing di folder proyek
<Directory /var/www/html/pnetlab-create-bulk-user>
    Options -Indexes
</Directory>

# Proteksi folder internal
<Directory /var/www/html/pnetlab-create-bulk-user/app/src>
    Require all denied
</Directory>

<Directory /var/www/html/pnetlab-create-bulk-user/app/apache>
    Require all denied
</Directory>
