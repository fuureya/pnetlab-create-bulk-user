# Keamanan: Sembunyikan identitas server (Global)
ServerTokens Prod
ServerSignature Off

<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html/pnetlab-create-bulk-user/app/public

    # Mengarahkan domain/api/bulkuser ke folder public
    Alias /bulkuser/api/v2/ /var/www/html/pnetlab-create-bulk-user/app/public/

    <Directory /var/www/html/pnetlab-create-bulk-user/app/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        
        # Base URL untuk rewrite
        RewriteEngine On
        RewriteBase /bulkuser/api/v2/
    </Directory>

    
    # Matikan directory listing untuk seluruh folder proyek agar aman
    <Directory /var/www/html/pnetlab-create-bulk-user>
        Options -Indexes
    </Directory>

    # Proteksi folder internal
    <Directory /var/www/html/pnetlab-create-bulk-user/app/src>
        Require all denied
    </Directory>
    
    <Directory /var/www/html/pnetlab-create-bulk-user/app/apache>
        Require all denied
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/pnetlab_error.log
    CustomLog ${APACHE_LOG_DIR}/pnetlab_access.log combined
</VirtualHost>
