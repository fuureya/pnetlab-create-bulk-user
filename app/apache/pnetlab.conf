<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html/public

    # Mengarahkan domain/api/bulkuser ke folder public
    Alias /api/bulkuser /var/www/html/public

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        
        # Base URL untuk rewrite
        RewriteEngine On
        RewriteBase /api/bulkuser/
    </Directory>

    # Keamanan: Sembunyikan identitas server
    ServerTokens Prod
    ServerSignature Off
    
    # Proteksi folder internal
    <Directory /var/www/html/src>
        Require all denied
    </Directory>
    
    <Directory /var/www/html/apache>
        Require all denied
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/pnetlab_error.log
    CustomLog ${APACHE_LOG_DIR}/pnetlab_access.log combined
</VirtualHost>
