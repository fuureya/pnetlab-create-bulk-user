version: '3.8'

services:
  app:
    build: .
    container_name: pnetlab-user-app
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./src:/var/www/html
    environment:
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
    extra_hosts:
      - "host.docker.internal:host-gateway"